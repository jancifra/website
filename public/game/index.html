<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Platformer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        /* JS overrides width/height at runtime; these are just fallbacks */
        width: 100vw;
        height: 100dvh;
        overflow: hidden;
      }
      canvas { touch-action: none; user-select: none; display: block; }
    </style>
    <script>
      // CSS viewport units are unreliable on iOS Safari — 100vh/dvh can include
      // the address-bar area, causing the canvas to overflow the visible screen.
      // window.innerHeight always reflects the *current* visual viewport height,
      // so we drive the body size from JS and refresh on every resize.
      (function () {
        function fit() {
          var vv = window.visualViewport;
          document.body.style.width  = (vv ? vv.width  : window.innerWidth)  + 'px';
          document.body.style.height = (vv ? vv.height : window.innerHeight) + 'px';
        }
        fit();
        var target = window.visualViewport || window;
        target.addEventListener('resize', fit);
        // Re-run once the page is fully laid out in case metrics shifted
        window.addEventListener('load', fit);
      }());
    </script>

  </head>
